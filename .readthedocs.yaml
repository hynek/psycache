---
version: 2

build:
  os: ubuntu-lts-latest
  tools:
    # Keep in sync with .python-version and tox.ini's docs base_python.
    python: "3.14"
  jobs:
    create_environment:
      # Need the tags to calculate the version.
      - git fetch --tags

      - asdf plugin add uv
      - asdf install uv latest
      - asdf global uv latest

    build:
      html:
        # Set canonical URL
        - python -c 'import os,pathlib; p = pathlib.Path("zensical.toml"); p.write_text(p.read_text().replace("https://psycache.hynek.me/", os.environ["READTHEDOCS_CANONICAL_URL"]))'
        - uvx --with tox-uv tox run -e docs-build
        # Zensical builds into site/; hand it to Read the Docs.
        # https://docs.readthedocs.com/platform/latest/intro/zensical.html
        - mkdir -p $READTHEDOCS_OUTPUT/html/
        - cp --recursive site/* $READTHEDOCS_OUTPUT/html/
