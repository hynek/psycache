[project]
site_name = "psycache"
site_description = "A psycopg-backed PostgreSQL key-value cache that stores JSON with TTL-based expiration and pluggable instrumentation."
site_author = "Hynek Schlawack"
site_url = "https://psycache.hynek.me/"

copyright = "Copyright &copy; 2026 Hynek Schlawack"

repo_url = "https://github.com/hynek/psycache"
repo_name = "hynek/psycache"
edit_uri = "edit/main/docs/"

# Trigger Read the Docs' search addon instead of Zensical's default.
extra_javascript = ["assets/javascript/readthedocs.js"]

nav = [
  { "Overview" = "index.md" },
  { "Basics" = [
    "getting-started.md",
    "pool-adapters.md",
    "raw-queries.md",
    "quality-of-life.md",
  ] },
  { "Features" = [
    "async.md",
    "cleanup.md",
    { "Instrumentation" = [
      "instrumentation/index.md",
      "instrumentation/prometheus.md",
      "instrumentation/sentry.md",
      "instrumentation/custom.md",
    ] },
  ] },
  { "Reference" = ["api.md", "api-types.md"] },
  { "Meta" = [
    { "License" = "https://github.com/hynek/psycache/blob/main/LICENSE" },
    { "Changelog" = "https://github.com/hynek/psycache/blob/main/CHANGELOG.md" },
  ] },
]

[project.theme]
font = false
language = "en"
features = [
  "announce.dismiss",
  "content.action.edit",
  "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/hynek/psycache"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/psycache/"

# API reference is generated by mkdocstrings.
# https://zensical.org/docs/setup/extensions/mkdocstrings/
[project.plugins.mkdocstrings.handlers.python]
inventories = [
    "https://docs.python.org/3/objects.inv",
    "https://www.psycopg.org/psycopg3/docs/objects.inv",
    "https://docs.sqlalchemy.org/en/stable/objects.inv",
]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
inherited_members = true
show_source = false
show_root_members_full_path = true
heading_level = 3


# ----------------------------------------------------------------------------
# Markdown extensions.
#
# Providing `markdown_extensions` REPLACES Zensical's built-in defaults (it does
# not merge), so we mirror Zensical's DEFAULT_MARKDOWN_EXTENSIONS here and add
# `smarty` for typographic ("smart") quotes, dashes, and ellipses.
# Keep in sync with Zensical's defaults on upgrades.
# ----------------------------------------------------------------------------
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.smarty]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [{ name = "mermaid", class = "mermaid" }]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.markdown_extensions.pymdownx.tilde]

[project.markdown_extensions.pymdownx.snippets]
base_path = ["."]
check_paths = true
